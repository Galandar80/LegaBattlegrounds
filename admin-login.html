<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Battlegrounds League</title>
    <link rel="stylesheet" href="assets/css/hearthstone-styles.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="assets/js/firebase-config.js"></script>
    <script src="assets/js/admin-auth.js"></script>
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: radial-gradient(circle, #2a144e 0%, #0d0617 100%);
            color: #fff;
            font-family: var(--font-primary);
        }

        .login-container {
            background-color: #1a0a2e;
            padding: 3rem;
            border-radius: 8px;
            border: 2px solid var(--hs-gold);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
            max-width: 400px;
            width: 90%;
            text-align: center;
        }

        .login-container h2 {
            margin-bottom: 2rem;
            color: var(--hs-gold);
            font-family: var(--font-primary);
            font-size: 2.5rem;
            text-transform: uppercase;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-control {
            width: 100%;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid var(--border-color);
            background-color: var(--input-bg);
            color: var(--text-color);
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background: var(--hs-purple);
            color: var(--hs-gold);
            border: 2px solid var(--hs-gold);
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-family: var(--font-primary);
            text-transform: uppercase;
            font-size: 1.1rem;
            transition: all 0.2s;
        }

        .btn-login:hover {
            background: var(--hs-purple-dark);
            box-shadow: 0 0 15px rgba(243, 210, 62, 0.3);
        }

        .error-msg {
            color: #dc3545;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>

<body>
    <div class="login-container">
        <h1>Admin Login</h1>
        <form id="loginForm">
            <div class="form-group">
                <input type="email" id="email" class="form-control" placeholder="Email admin" autocomplete="username" required>
            </div>
            <div class="form-group">
                <input type="password" id="password" class="form-control" placeholder="Password" autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn-login">Accedi</button>
            <div id="errorMsg" class="error-msg">Credenziali non valide o account non autorizzato</div>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const submitButton = this.querySelector('button[type="submit"]');
            const errorMsg = document.getElementById('errorMsg');

            submitButton.disabled = true;
            submitButton.textContent = 'Accesso...';
            errorMsg.style.display = 'none';

            AdminAuth.login(email, password).catch(function (error) {
                console.error('Errore login admin:', error);
                errorMsg.style.display = 'block';
                submitButton.disabled = false;
                submitButton.textContent = 'Accedi';
            });
        });
    </script>
</body>

</html>
